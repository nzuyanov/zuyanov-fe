<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>Emerald gemstone facets</title>
  <desc>Seamless tileable emerald crystal faceted surface</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d7c5a" />
      <stop offset="60%" stop-color="#086b4a" />
      <stop offset="100%" stop-color="#064E3B" />
    </radialGradient>
    <!-- Грани огранки — полигоны с разными оттенками зелёного -->
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#064E3B" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="f2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea472" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#064E3B" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="f3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#15d99a" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#065840" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="f4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#053d2b" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="f5" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#0d9e6e" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#064E3B" stop-opacity="0.04" />
    </linearGradient>
    <!-- Блик на гранях -->
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="edge2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Основной фон -->
  <rect width="200" height="200" fill="url(#bg)" />

  <!-- Крупные грани огранки — неправильные многоугольники -->
  <g>
    <!-- Верхний ряд граней -->
    <polygon points="0,0 45,0 60,35 30,50 0,30" fill="url(#f1)" />
    <polygon points="45,0 105,0 90,30 60,35" fill="url(#f2)" />
    <polygon points="105,0 155,0 140,40 90,30" fill="url(#f3)" />
    <polygon points="155,0 200,0 200,35 180,45 140,40" fill="url(#f4)" />

    <!-- Средне-верхний ряд -->
    <polygon points="0,30 30,50 50,80 20,70 0,55" fill="url(#f5)" />
    <polygon points="30,50 60,35 90,30 100,60 70,75 50,80" fill="url(#f1)" />
    <polygon points="90,30 140,40 145,70 100,60" fill="url(#f4)" />
    <polygon points="140,40 180,45 200,35 200,75 170,80 145,70" fill="url(#f2)" />

    <!-- Средний ряд -->
    <polygon points="0,55 20,70 35,105 0,95" fill="url(#f3)" />
    <polygon points="20,70 50,80 70,75 85,110 55,115 35,105" fill="url(#f4)" />
    <polygon points="70,75 100,60 145,70 135,105 85,110" fill="url(#f5)" />
    <polygon points="145,70 170,80 200,75 200,110 165,105 135,105" fill="url(#f1)" />

    <!-- Средне-нижний ряд -->
    <polygon points="0,95 35,105 40,140 15,145 0,130" fill="url(#f2)" />
    <polygon points="35,105 55,115 75,140 40,140" fill="url(#f1)" />
    <polygon points="55,115 85,110 135,105 130,140 100,145 75,140" fill="url(#f3)" />
    <polygon points="135,105 165,105 200,110 200,140 175,145 130,140" fill="url(#f5)" />

    <!-- Нижний ряд -->
    <polygon points="0,130 15,145 25,175 0,180" fill="url(#f4)" />
    <polygon points="15,145 40,140 75,140 70,175 45,180 25,175" fill="url(#f5)" />
    <polygon points="75,140 100,145 130,140 125,175 90,180 70,175" fill="url(#f2)" />
    <polygon points="130,140 175,145 200,140 200,180 160,178 125,175" fill="url(#f4)" />

    <!-- Самый нижний — тайлинг -->
    <polygon points="0,180 25,175 45,180 50,200 0,200" fill="url(#f1)" />
    <polygon points="45,180 70,175 90,180 100,200 50,200" fill="url(#f3)" />
    <polygon points="90,180 125,175 160,178 155,200 100,200" fill="url(#f5)" />
    <polygon points="160,178 200,180 200,200 155,200" fill="url(#f2)" />
  </g>

  <!-- Рёбра граней — тонкие линии между гранями -->
  <g stroke="#10B981" stroke-opacity="0.1" fill="none" stroke-width="0.5" stroke-linejoin="round">
    <!-- Горизонтальные рёбра -->
    <polyline points="0,30 30,50 60,35 90,30 140,40 180,45 200,35" />
    <polyline points="0,55 20,70 50,80 70,75 100,60 145,70 170,80 200,75" />
    <polyline points="0,95 35,105 55,115 85,110 135,105 165,105 200,110" />
    <polyline points="0,130 15,145 40,140 75,140 100,145 130,140 175,145 200,140" />
    <polyline points="0,180 25,175 45,180 70,175 90,180 125,175 160,178 200,180" />
    <!-- Вертикальные/диагональные рёбра -->
    <line x1="30" y1="50" x2="20" y2="70" />
    <line x1="60" y1="35" x2="50" y2="80" />
    <line x1="90" y1="30" x2="100" y2="60" />
    <line x1="140" y1="40" x2="145" y2="70" />
    <line x1="180" y1="45" x2="170" y2="80" />
    <line x1="20" y1="70" x2="35" y2="105" />
    <line x1="50" y1="80" x2="55" y2="115" />
    <line x1="70" y1="75" x2="85" y2="110" />
    <line x1="100" y1="60" x2="135" y2="105" />
    <line x1="145" y1="70" x2="165" y2="105" />
    <line x1="35" y1="105" x2="40" y2="140" />
    <line x1="55" y1="115" x2="75" y2="140" />
    <line x1="85" y1="110" x2="100" y2="145" />
    <line x1="135" y1="105" x2="130" y2="140" />
    <line x1="165" y1="105" x2="175" y2="145" />
    <line x1="15" y1="145" x2="25" y2="175" />
    <line x1="40" y1="140" x2="45" y2="180" />
    <line x1="75" y1="140" x2="70" y2="175" />
    <line x1="100" y1="145" x2="90" y2="180" />
    <line x1="130" y1="140" x2="125" y2="175" />
    <line x1="175" y1="145" x2="160" y2="178" />
  </g>

  <!-- Светлые блики на отдельных гранях — имитация преломления света -->
  <g>
    <polygon points="30,50 60,35 90,30 100,60 70,75 50,80" fill="url(#edge1)" />
    <polygon points="135,105 165,105 200,110 200,140 175,145 130,140" fill="url(#edge2)" />
    <polygon points="0,130 15,145 40,140 35,105 0,95" fill="url(#edge1)" />
    <polygon points="90,180 125,175 160,178 155,200 100,200" fill="url(#edge2)" />
    <polygon points="105,0 155,0 140,40 90,30" fill="url(#edge1)" />
  </g>

  <!-- Точечные блики — «искры» на рёбрах -->
  <g fill="#10B981" opacity="0.12">
    <circle cx="30" cy="50" r="1.5" />
    <circle cx="100" cy="60" r="1.2" />
    <circle cx="85" cy="110" r="1.4" />
    <circle cx="175" cy="145" r="1" />
    <circle cx="45" cy="180" r="1.3" />
    <circle cx="140" cy="40" r="1.1" />
    <circle cx="70" cy="75" r="1.2" />
    <circle cx="130" cy="140" r="1" />
  </g>
</svg>
