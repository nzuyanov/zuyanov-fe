<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="1st place trophy">
  <title>1st Place</title>
  <desc>Golden trophy for first place</desc>
  <defs>
    <linearGradient id="tg-cup-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d96e" />
      <stop offset="40%" stop-color="#f5a623" />
      <stop offset="100%" stop-color="#a06a08" />
    </linearGradient>
    <linearGradient id="tg-cup-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8860a" />
      <stop offset="100%" stop-color="#7a5008" />
    </linearGradient>
    <linearGradient id="tg-stem-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c860" />
      <stop offset="100%" stop-color="#a07010" />
    </linearGradient>
    <linearGradient id="tg-base-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c860" />
      <stop offset="50%" stop-color="#d4a020" />
      <stop offset="100%" stop-color="#8a6a10" />
    </linearGradient>
    <radialGradient id="tg-gloss" cx="35%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="tg-handle-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c860" />
      <stop offset="100%" stop-color="#9a7010" />
    </linearGradient>
    <linearGradient id="tg-handle-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c860" />
      <stop offset="100%" stop-color="#9a7010" />
    </linearGradient>
    <linearGradient id="tg-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5008" />
      <stop offset="100%" stop-color="#4a3005" />
    </linearGradient>
  </defs>
  <g id="trophy-gold">
    <!-- Подставка -->
    <rect x="58" y="172" width="84" height="14" rx="4" fill="url(#tg-base-grad)" stroke="#8a6a10" stroke-width="0.8" />
    <rect x="68" y="164" width="64" height="12" rx="3" fill="url(#tg-base-grad)" stroke="#8a6a10" stroke-width="0.8" />
    <!-- Ножка -->
    <rect x="90" y="130" width="20" height="38" rx="3" fill="url(#tg-stem-grad)" stroke="#9a7010" stroke-width="0.8" />
    <!-- Чаша кубка -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#tg-cup-grad)" stroke="#9a7010" stroke-width="1" stroke-linejoin="round" />
    <!-- Внутренняя часть чаши -->
    <ellipse cx="100" cy="34" rx="44" ry="12" fill="url(#tg-cup-inner)" stroke="#8a6a10" stroke-width="0.8" />
    <!-- Ручка левая -->
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="url(#tg-handle-l)" stroke-width="8" stroke-linecap="round" />
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="#f7d96e" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <!-- Ручка правая -->
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="url(#tg-handle-r)" stroke-width="8" stroke-linecap="round" />
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="#f7d96e" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <!-- Цифра 1 -->
    <text x="100" y="88" text-anchor="middle" dominant-baseline="central" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#tg-text-grad)" stroke="#4a3005" stroke-width="1">1</text>
    <!-- Блик -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#tg-gloss)" />
  </g>
</svg>