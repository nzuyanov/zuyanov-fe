<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="2nd place trophy">
  <title>2nd Place</title>
  <desc>Silver trophy for second place</desc>
  <defs>
    <linearGradient id="ts-cup-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8" />
      <stop offset="40%" stop-color="#c0c0c0" />
      <stop offset="100%" stop-color="#707078" />
    </linearGradient>
    <linearGradient id="ts-cup-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#909098" />
      <stop offset="100%" stop-color="#606068" />
    </linearGradient>
    <linearGradient id="ts-stem-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8d8d8" />
      <stop offset="100%" stop-color="#808088" />
    </linearGradient>
    <linearGradient id="ts-base-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8" />
      <stop offset="50%" stop-color="#b0b0b8" />
      <stop offset="100%" stop-color="#707078" />
    </linearGradient>
    <radialGradient id="ts-gloss" cx="35%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ts-handle-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8d8d8" />
      <stop offset="100%" stop-color="#787880" />
    </linearGradient>
    <linearGradient id="ts-handle-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8" />
      <stop offset="100%" stop-color="#787880" />
    </linearGradient>
    <linearGradient id="ts-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505058" />
      <stop offset="100%" stop-color="#303038" />
    </linearGradient>
  </defs>
  <g id="trophy-silver">
    <!-- Подставка -->
    <rect x="58" y="172" width="84" height="14" rx="4" fill="url(#ts-base-grad)" stroke="#707078" stroke-width="0.8" />
    <rect x="68" y="164" width="64" height="12" rx="3" fill="url(#ts-base-grad)" stroke="#707078" stroke-width="0.8" />
    <!-- Ножка -->
    <rect x="90" y="130" width="20" height="38" rx="3" fill="url(#ts-stem-grad)" stroke="#787880" stroke-width="0.8" />
    <!-- Чаша кубка -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#ts-cup-grad)" stroke="#787880" stroke-width="1" stroke-linejoin="round" />
    <!-- Внутренняя часть чаши -->
    <ellipse cx="100" cy="34" rx="44" ry="12" fill="url(#ts-cup-inner)" stroke="#707078" stroke-width="0.8" />
    <!-- Ручка левая -->
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="url(#ts-handle-l)" stroke-width="8" stroke-linecap="round" />
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="#e8e8e8" stroke-width="4" stroke-linecap="round" opacity="0.25" />
    <!-- Ручка правая -->
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="url(#ts-handle-r)" stroke-width="8" stroke-linecap="round" />
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="#e8e8e8" stroke-width="4" stroke-linecap="round" opacity="0.25" />
    <!-- Цифра 2 -->
    <text x="100" y="88" text-anchor="middle" dominant-baseline="central" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#ts-text-grad)" stroke="#303038" stroke-width="1">2</text>
    <!-- Блик -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#ts-gloss)" />
  </g>
</svg>