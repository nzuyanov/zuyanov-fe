<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="3rd place trophy">
  <title>3rd Place</title>
  <desc>Bronze trophy for third place</desc>
  <defs>
    <linearGradient id="tb-cup-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a050" />
      <stop offset="40%" stop-color="#cd7f32" />
      <stop offset="100%" stop-color="#6a3e15" />
    </linearGradient>
    <linearGradient id="tb-cup-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5a20" />
      <stop offset="100%" stop-color="#5a3510" />
    </linearGradient>
    <linearGradient id="tb-stem-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d89048" />
      <stop offset="100%" stop-color="#7a4818" />
    </linearGradient>
    <linearGradient id="tb-base-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d89048" />
      <stop offset="50%" stop-color="#b07030" />
      <stop offset="100%" stop-color="#6a3e15" />
    </linearGradient>
    <radialGradient id="tb-gloss" cx="35%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="tb-handle-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d89048" />
      <stop offset="100%" stop-color="#6a3e15" />
    </linearGradient>
    <linearGradient id="tb-handle-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d89048" />
      <stop offset="100%" stop-color="#6a3e15" />
    </linearGradient>
    <linearGradient id="tb-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2808" />
      <stop offset="100%" stop-color="#2a1505" />
    </linearGradient>
  </defs>
  <g id="trophy-bronze">
    <!-- Подставка -->
    <rect x="58" y="172" width="84" height="14" rx="4" fill="url(#tb-base-grad)" stroke="#6a3e15" stroke-width="0.8" />
    <rect x="68" y="164" width="64" height="12" rx="3" fill="url(#tb-base-grad)" stroke="#6a3e15" stroke-width="0.8" />
    <!-- Ножка -->
    <rect x="90" y="130" width="20" height="38" rx="3" fill="url(#tb-stem-grad)" stroke="#7a4818" stroke-width="0.8" />
    <!-- Чаша кубка -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#tb-cup-grad)" stroke="#7a4818" stroke-width="1" stroke-linejoin="round" />
    <!-- Внутренняя часть чаши -->
    <ellipse cx="100" cy="34" rx="44" ry="12" fill="url(#tb-cup-inner)" stroke="#6a3e15" stroke-width="0.8" />
    <!-- Ручка левая -->
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="url(#tb-handle-l)" stroke-width="8" stroke-linecap="round" />
    <path d="M54,50 C30,50 22,72 22,85 C22,102 36,112 56,108" fill="none" stroke="#e0a050" stroke-width="4" stroke-linecap="round" opacity="0.25" />
    <!-- Ручка правая -->
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="url(#tb-handle-r)" stroke-width="8" stroke-linecap="round" />
    <path d="M146,50 C170,50 178,72 178,85 C178,102 164,112 144,108" fill="none" stroke="#e0a050" stroke-width="4" stroke-linecap="round" opacity="0.25" />
    <!-- Цифра 3 -->
    <text x="100" y="88" text-anchor="middle" dominant-baseline="central" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#tb-text-grad)" stroke="#2a1505" stroke-width="1">3</text>
    <!-- Блик -->
    <path d="M52,32 L56,110 C56,128 80,138 100,138 C120,138 144,128 144,110 L148,32 Z" fill="url(#tb-gloss)" />
  </g>
</svg>