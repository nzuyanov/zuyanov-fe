<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Big Blind chip">
  <title>Big Blind</title>
  <desc>Golden poker chip with BB text</desc>
  <defs>
    <radialGradient id="bb-rim-grad" cx="40%" cy="35%" r="55%" fx="38%" fy="30%">
      <stop offset="0%" stop-color="#f0c860" />
      <stop offset="70%" stop-color="#d4a020" />
      <stop offset="100%" stop-color="#8a6a10" />
    </radialGradient>
    <radialGradient id="bb-body-grad" cx="40%" cy="35%" r="55%" fx="38%" fy="30%">
      <stop offset="0%" stop-color="#f5d470" />
      <stop offset="70%" stop-color="#d4a020" />
      <stop offset="100%" stop-color="#9a7a15" />
    </radialGradient>
    <radialGradient id="bb-gloss" cx="38%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bb-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c3a00" />
      <stop offset="100%" stop-color="#3a2200" />
    </linearGradient>
    <clipPath id="bb-rim-clip">
      <path d="M100,8 a92,92 0 1,1 0,184 a92,92 0 1,1 0,-184 Z M100,28 a72,72 0 1,0 0,144 a72,72 0 1,0 0,-144 Z" />
    </clipPath>
  </defs>
  <g id="bb-chip">
    <circle cx="100" cy="100" r="96" fill="url(#bb-rim-grad)" stroke="#7a5a08" stroke-width="1" />
    <circle cx="100" cy="100" r="92" fill="url(#bb-rim-grad)" />
    <g clip-path="url(#bb-rim-clip)">
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(0,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(45,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(90,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(135,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(180,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(225,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(270,100,100)" />
      <rect x="93" y="4" width="14" height="28" rx="2" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5" transform="rotate(315,100,100)" />
    </g>
    <circle cx="100" cy="100" r="70" fill="url(#bb-body-grad)" stroke="#8a6a10" stroke-width="1" />
    <circle cx="100" cy="100" r="60" fill="none" stroke="#b8880a" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5" />
    <text x="100" y="102" text-anchor="middle" dominant-baseline="central" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="url(#bb-text-grad)" stroke="#3a2200" stroke-width="1">BB</text>
    <circle cx="100" cy="100" r="96" fill="url(#bb-gloss)" />
  </g>
</svg>